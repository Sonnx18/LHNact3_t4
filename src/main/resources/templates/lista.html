<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Catálogo de Canciones</title>
  <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
  <div class="contenedor">
    <h1>Catálogo de Canciones</h1>
    <p class="subtitulo" th:text="${appNombre}"></p>

    <div class="barra">
      <a class="boton" th:href="@{/canciones/nueva}">Agregar canción</a>
    </div>

    <table class="tabla">
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Género</th>
          <th>Año</th>
          <th>Artista</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${canciones}">
          <td th:text="${c.id}"></td>
          <td th:text="${c.titulo}"></td>
          <td th:text="${c.genero}"></td>
          <td th:text="${c.anio}"></td>
          <td th:text="${c.artista != null ? c.artista.nombre : '—'}"></td>
          <td>
            <a th:href="@{/canciones/{id}(id=${c.id})}">Ver</a>
            &nbsp;
            <a th:href="@{/canciones/editar/{id}(id=${c.id})}">Editar</a>
            &nbsp;
            <a class="del" th:href="@{/canciones/eliminar/{id}(id=${c.id})}"
               onclick="return confirm('¿Eliminar canción?')">Eliminar</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(canciones)}">
          <td colspan="6" style="color:var(--muted);text-align:center;padding:1.5rem;">Sin canciones registradas</td>
        </tr>
      </tbody>
    </table>

    <a class="volver" th:href="@{/}">← Inicio</a>
  </div>
</body>
</html>
